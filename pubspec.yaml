name: first_date
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Architecture & State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  
  # Navigation
  go_router: ^17.0.1
  
  # Dependency Injection
  get_it: ^9.2.0
  injectable: ^2.4.2
  
  # Networking
  dio: ^5.5.0
  retrofit: ^4.4.1
  
  # Data & Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  
  # Database (Isar)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  
  # Backend
  cloud_firestore: ^6.1.2
  firebase_core: ^4.4.0

  # UI Components
  google_fonts: ^8.0.0
  cached_network_image: ^3.3.1
  flutter_card_swiper: ^7.2.0
  firebase_auth: ^6.1.4
  http: ^1.6.0
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generators
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.1
  retrofit_generator: ^9.1.2 
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

# ⚡ THE "PEACE TREATY" OVERRIDES ⚡
# These force incompatible packages to work together.
dependency_overrides:
  analyzer: 6.4.1       # Fixes "macros" error
  dart_style: 2.3.6     # Fixes "MixinOnClause" error